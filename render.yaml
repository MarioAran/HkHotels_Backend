services:
  - type: web
    name: hkhotels-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hkhotels-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: FLASK_ENV
        value: production

databases:
  - name: hkhotels-db
    plan: free
    databaseName: hk_hotel_db